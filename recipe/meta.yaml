{% set name = "elpa" %}
{% set version = "2026.02.001" %}
{% set build = 0 %}

{% if mpi == "nompi" %}
  {% set build = build + 100 %}
  {% set elpa_suffix = "_onenode" %}
  {% set mpi_prefix = "nompi" %}
{% else %}
  {% set elpa_suffix = "" %}
  {% set mpi_prefix = "mpi_" + mpi %}
{% endif %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://elpa.mpcdf.mpg.de/software/tarball-archive/Releases/{{ version }}/{{ name }}-{{ version }}.tar.gz
  sha256: a379f27f4dbd27b2ee45017afec656d064301e97150c874649bdfd64957b75ed
  patches:
    - check_thread_affinity.patch
    - includedir-suffix.patch
    - pkgconf.patch

build:
  number: {{ build }}
  skip: true  # [win]
  string: {{ mpi_prefix }}_h{{ PKG_HASH }}_{{ build }}
  run_exports:
    - {{ pin_subpackage("elpa", max_pin="x.x.x") }}

requirements:
  build:
    - {{ compiler("c") }}
    - {{ stdlib("c") }}
    - {{ compiler("cxx") }}
    - {{ compiler("fortran") }}
    - {{ mpi }}  # [mpi != "nompi"]
    - gnuconfig  # [unix]
    - make
    - perl
    - pkg-config
  host:
    - {{ mpi }}  # [mpi != "nompi"]
    - libblas
    - liblapack
    - "libopenblas * *openmp*"
    - scalapack  # [mpi != "nompi"]
  run:
    - {{ mpi }}  # [mpi != "nompi"]
    - _openmp_mutex
    - libblas
    - liblapack
    - "libopenblas * *openmp*"
    - scalapack  # [mpi != "nompi"]

test:
  requires:
    - {{ mpi }}  # [mpi != "nompi"]
    - pkg-config
  commands:
    # Library presence
    - test -f "$PREFIX/lib/libelpa{{ elpa_suffix }}${SHLIB_EXT}"
    - test -f "$PREFIX/lib/libelpa{{ elpa_suffix }}_openmp${SHLIB_EXT}"
    # pkg-config checks
    - pkg-config --exists elpa{{ elpa_suffix }}
    - pkg-config --exists elpa{{ elpa_suffix }}_openmp
    # Binary execution checks
    - elpa2_print_kernels{{ elpa_suffix }}
    - elpa2_print_kernels{{ elpa_suffix }}_openmp

about:
  home: https://elpa.mpcdf.mpg.de/
  doc_url: https://elpa.mpcdf.mpg.de/documentation/
  dev_url: https://gitlab.mpcdf.mpg.de/elpa/elpa
  license: LGPL-3.0-only
  license_file:
    - LICENSE
    - COPYING/COPYING
    - COPYING/gpl.txt
    - COPYING/lgpl.txt
  summary: Eigenvalue Solvers for Petaflop-Applications
  description: |
    The computation of selected or all eigenvalues and eigenvectors of a symmetric
    (Hermitian) matrix has high relevance for various scientific disciplines.
    For the calculation of a significant part of the eigensystem typically direct
    eigensolvers are used. For large problems, the eigensystem calculations with
    existing solvers can become the computational bottleneck.

extra:
  recipe-maintainers:
    - jan-janssen
    - awvwgk
    - yuzie007
    - mkrack
