{% set name = "elpa" %}
{% set version = "2026.02.001" %}
{% set build = 0 %}
{% set mpi = mpi or "nompi" %}

# ELPA uses suffixes to allow parallel installation of several versions in the same prefix
{% if mpi == "nompi" %}
{% set elpa_suffix = "_onenode" %}
{% else %}
{% set elpa_suffix = "" %}
{% endif %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://elpa.mpcdf.mpg.de/software/tarball-archive/Releases/{{ version }}/{{ name }}-{{ version }}.tar.gz
  sha256: a379f27f4dbd27b2ee45017afec656d064301e97150c874649bdfd64957b75ed
  patches:
    - fdep-perl.patch
    - pkgconf.patch
    - check_thread_affinity.patch
    - includedir-suffix.patch

{% if mpi == "nompi" %}
{% set build = build + 100 %}
{% endif %}
build:
  number: {{ build }}
  skip: true  # [win]

  {% if mpi != "nompi" %}
  {% set mpi_prefix = "mpi_" + mpi %}
  {% else %}
  {% set mpi_prefix = "nompi" %}
  {% endif %}
  string: {{ mpi_prefix }}_h{{ PKG_HASH }}_{{ build }}

  run_exports:
  {% if mpi != "nompi" %}
    - {{ name }} * {{ mpi_prefix }}_*
  {% endif %}
    - {{ pin_subpackage('elpa', max_pin='x.x.x') }}

requirements:
  build:
    - gnuconfig  # [unix]
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}
    - {{ stdlib("c") }}
    - {{ mpi }}  # [mpi != "nompi"]
    - make
    - perl
    - pkg-config
  host:
    - {{ mpi }}  # [mpi != 'nompi']
    - libblas
    - liblapack
    - "libopenblas * *openmp*"
    - scalapack  # [mpi != 'nompi']
  run:
    - {{ mpi }}  # [mpi != "nompi"]
    - "libopenblas * *openmp*"
    - scalapack  # [mpi != "nompi"]

test:
  requires:
    - {{ mpi }}  # [mpi != 'nompi']
    - pkg-config
  commands:
    # Set OpenMPI sandbox escape flags to prevent Docker container initialization failures
    - export OMPI_MCA_btl=self,vader  # [mpi == 'openmpi']
    - export OMPI_MCA_plm_rsh_agent=sh  # [mpi == 'openmpi']
    - export AM_DEFAULT_VERBOSITY=1  # [mpi == 'openmpi']
    # Shared library checks
    - test -f $PREFIX/lib/libelpa{{ elpa_suffix }}${SHLIB_EXT}
    - test -f $PREFIX/lib/libelpa{{ elpa_suffix }}_openmp${SHLIB_EXT}
    # Package metadata checks
    - pkg-config elpa{{ elpa_suffix }} --exact-version {{ version }}
    - pkg-config elpa{{ elpa_suffix }}_openmp --exact-version {{ version }}
    # Binary execution checks without MPI
    - elpa2_print_kernels{{ elpa_suffix }}  # [mpi == 'nompi']
    - elpa2_print_kernels{{ elpa_suffix }}_openmp  # [mpi == 'nompi']
    # Binary execution checks with MPI
    - mpiexec -n 1 elpa2_print_kernels{{ elpa_suffix }}  # [mpi != 'nompi']
    - mpiexec -n 1 elpa2_print_kernels{{ elpa_suffix }}_openmp  # [mpi != 'nompi']

about:
  home: https://elpa.mpcdf.mpg.de/
  doc_url: https://elpa.mpcdf.mpg.de/documentation/doxygen/ELPA_DOXYGEN_PAGES/ELPA-{{ version }}/html/index.html
  dev_url: https://gitlab.mpcdf.mpg.de/elpa/elpa
  license: LGPL-3.0-only
  license_file:
    - LICENSE
    - COPYING/COPYING
    - COPYING/gpl.txt
    - COPYING/lgpl.txt
  summary: Eigenvalue Solvers for Petaflop-Applications
  description: |
    The computation of selected or all eigenvalues and eigenvectors of a symmetric
    (Hermitian) matrix has high relevance for various scientific disciplines.
    For the calculation of a significant part of the eigensystem typically direct
    eigensolvers are used. For large problems, the eigensystem calculations with
    existing solvers can become the computational bottleneck.

extra:
  recipe-maintainers:
    - jan-janssen
    - awvwgk
    - yuzie007
    - mkrack
